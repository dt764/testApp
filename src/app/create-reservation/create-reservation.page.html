<ion-header>
  <ion-toolbar class="gradient-header">
     <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/reservations"></ion-back-button>
    </ion-buttons>
    <ion-title>Create Reservation</ion-title>
  </ion-toolbar>
</ion-header>
<ion-content class="page-content">
  <div class="reservation-form">
    <ion-item class="form-item">
      <ion-label position="floating">Reservation Name</ion-label>
      <ion-input [(ngModel)]="reservationName" class="form-input"></ion-input>
    </ion-item>
    <ion-button class="save-button" expand="block" (click)="saveReservation()">
      Save
    </ion-button>
  </div>
</ion-content>
